<div class="toast-container">
  @for (toast of toasts(); track toast.id) {
    <div class="toast toast-{{ toast.type }}" [class.toast-enter]="toast.isVisible">
      <span class="toast-icon">
        <fn-icon [name]="getIconName(toast)" variant="Colour" size="medium"></fn-icon>
      </span>
      <div class="toast-content">
        <span class="toast-message">
          {{ toast.message | translate }}
        </span>
      </div>
      <button class="toast-close" (click)="removeToast(toast.id)" aria-label="Close">
        <fn-icon name="cross" variant="Line" size="medium" color="#ffffff"></fn-icon>
      </button>
    </div>
  }
</div>
